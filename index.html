<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Styled POST Form</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #fff;
        --accent: #4f46e5;
        --muted: #6b7280;
        --radius: 12px;
        --shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
      }

      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(79, 70, 229, 0.06),
            transparent 8%
          ),
          radial-gradient(
            circle at 90% 90%,
            rgba(79, 70, 229, 0.04),
            transparent 10%
          ),
          var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .card {
        width: 100%;
        max-width: 640px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p.lead {
        margin: 0 0 20px;
        color: var(--muted);
      }

      /* === Form layout ===
           - label sits full width above inputs
           - .row contains .input-group + button on the same horizontal row
           - responsive: row becomes column on narrow viewports */
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* label full width, separate row */
      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
      }

      /* row that contains input-group + button */
      .row {
        display: flex;
        gap: 12px;
        align-items: flex-start; /* button aligns to top of input-group (the input) */
      }

      /* group input + status vertically */
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1 1 auto; /* take remaining space so button sits to the right */
        min-width: 0; /* allow input to shrink inside flex */
      }

      input[type="text"] {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #e6e9ee;
        outline: none;
        font-size: 15px;
        transition:
          box-shadow 0.15s,
          border-color 0.15s;
        width: 100%;
        box-sizing: border-box;
        background: white;
        color: inherit;
        line-height: 1;
      }

      input[type="text"]:focus {
        border-color: rgba(79, 70, 229, 0.9);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.08);
      }

      #status {
        font-size: 13px;
        color: var(--muted);
        line-height: 1;
      }

      button {
        background: linear-gradient(180deg, var(--accent), #3730a3);
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(79, 70, 229, 0.12);
        transition:
          transform 0.08s ease,
          opacity 0.08s,
          box-shadow 0.08s;
        align-self: flex-start; /* top-align on desktop */
        line-height: 1;
        height: 42px;
        min-width: 86px;
      }

      button:active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 3px solid rgba(79, 70, 229, 0.18);
        outline-offset: 2px;
      }

      /* Mobile: stack the row vertically so button goes below status */
      @media (max-width: 520px) {
        .row {
          flex-direction: column;
          align-items: stretch;
        }
        button {
          width: 100%;
          align-self: stretch;
        }
      }

      /* Simple messages list styling */
      h2 {
        margin-top: 20px;
        font-size: 16px;
      }
      #messages {
        margin: 8px 0 0;
        padding-left: 16px;
      }
      #messages li {
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>ESP32 LED Control</h1>
      <p class="lead">
        Use the form below to control the LED connected to the ESP32.
      </p>

      <form id="msgForm" method="POST" action="/" autocomplete="off">
        <label for="message">Message</label>

        <div class="row">
          <div class="input-group">
            <input
              id="message"
              name="message"
              type="text"
              placeholder=""
              required
            />
            <span id="status" aria-live="polite"></span>
          </div>

          <button type="submit">Send</button>
        </div>
      </form>

      <h2>Messages</h2>
      <ul id="messages"></ul>
    </main>

    <script>
      const form = document.getElementById("msgForm");
      const input = document.getElementById("message");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const value = input.value.trim();

        console.log(`Sending message >${value}<`);

        if (!value) {
          return;
        }

        let planningTimer;

        const initialTimer = setTimeout(() => {
          status.textContent = "Sending...";

          planningTimer = setTimeout(() => {
            status.textContent = "Planning execution...";
          }, 1_000);
        }, 1_000);

        try {
          const res = await fetch("/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: value }),
          });

          clearTimeout(initialTimer);
          clearTimeout(planningTimer);
          status.textContent = "";

          if (!res.ok) {
            const err = await res.text();
            throw new Error(err || "Server error");
          }

          const list = document.getElementById("messages");
          list.innerHTML += `<li>${value}</li>`;
          console.log(
            "list updated inner html",
            document.getElementById("messages").innerHTML,
          );

          input.value = "";
          input.focus();
        } catch (err) {
          console.error(err);
        }
      });
    </script>
  </body>
</html>
