<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Styled POST Form</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --accent: #4f46e5;
        --muted: #6b7280;
        --radius: 12px;
        --shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
      }

      html,
      body {
        height: calc(100vh - 48px);
      }

      body {
        margin: 0;
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(79, 70, 229, 0.06),
            transparent 8%
          ),
          radial-gradient(
            circle at 90% 90%,
            rgba(79, 70, 229, 0.04),
            transparent 10%
          ),
          var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #0f172a;
      }

      .card {
        width: 100%;
        max-width: 640px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p.lead {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
      }

      .input-wrap {
        display: flex;
        flex-direction: column;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input[type="text"] {
        height: 16px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #e6e9ee;
        outline: none;
        font-size: 15px;
        transition:
          box-shadow 0.15s,
          border-color 0.15s;
      }
      input[type="text"]:focus {
        border-color: rgba(79, 70, 229, 0.9);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.08);
      }
      button {
        background: linear-gradient(180deg, var(--accent), #3730a3);
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(79, 70, 229, 0.12);
        transition:
          transform 0.08s ease,
          opacity 0.08s;
        align-self: end;
        line-height: 1;
        height: 42px;
      }

      button:active {
        transform: translateY(1px);
      }

      @media (max-width: 520px) {
        form {
          grid-template-columns: 1fr;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Send a message</h1>
      <p class="lead">
        Type anything and press Send. The text will be POSTed back to this
        server.
      </p>

      <form method="POST" action="/" autocomplete="off">
        <div class="input-wrap">
          <label for="message">Message</label>
          <input
            id="message"
            name="message"
            type="text"
            placeholder="Hello world"
            required
          />
        </div>
        <button type="submit">Send</button>
      </form>

      <h2>Messages</h2>
      <ul id="messages"></ul>
    </main>

    <script>
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const value = input.value.trim();

        if (!value) {
          return;
        }

        try {
          const res = await fetch("/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: value }),
          });

          if (!res.ok) {
            const err = await res.text();
            throw new Error(err || "Server error");
          }

          const list = document.getElementById("messages");
          list.innerHTML += `<li>${value}</li>`;

          input.value = "";
          input.focus();
        } catch (err) {
          console.error(err);
        }
      });
    </script>
  </body>
</html>
